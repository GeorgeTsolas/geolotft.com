<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guides — Geolo TFT</title>
    <meta name="description" content="TFT guides by Geolo. Learn economy, tempo, positioning, itemization and more to climb consistently.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-border: rgba(201, 168, 76, 0.3);
            --navy-deep: #03060f;
            --navy-mid: #07101f;
            --navy-card: #0b1628;
            --navy-card-hover: #0f1e38;
            --text-primary: #f0ead8;
            --text-muted: #8a96aa;
            --text-dim: #5a6478;
            --teal: #2a9d8f;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--navy-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 85% 65%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 5%, rgba(255,255,255,0.4) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(201, 168, 76, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ── Nav ── */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--gold-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 2rem; list-style: none; }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--gold-light); }
        .nav-links a.active { color: var(--gold); }

        /* ── Page header ── */
        .page-header {
            padding: 4rem 0 3rem;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--gold-border);
            margin-bottom: 3rem;
        }

        .page-header-text p {
            font-size: 0.85rem;
            color: var(--gold);
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.6rem;
        }

        .page-header-text h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.1;
            letter-spacing: 0.04em;
        }

        .page-header-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.7;
            max-width: 500px;
            font-weight: 300;
            margin-top: 1rem;
        }

        /* ── Guide card ── */
        .guide-card {
            background: var(--navy-card);
            border: 1px solid var(--gold-border);
            border-radius: 14px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0;
            transition: border-color 0.25s, background 0.25s, transform 0.25s;
            position: relative;
            margin-bottom: 3rem;
        }

        .guide-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .guide-card:hover {
            border-color: rgba(201, 168, 76, 0.6);
            background: var(--navy-card-hover);
            transform: translateY(-2px);
        }

        .guide-card-body {
            padding: 2rem 2rem 2rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .guide-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .guide-tag {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--navy-deep);
            background: var(--gold);
            padding: 3px 10px;
            border-radius: 20px;
        }

        .guide-tag.free-tag {
            background: var(--teal);
            color: #fff;
        }

            color: var(--text-dim);
